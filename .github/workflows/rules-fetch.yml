name: 抓取 RoboMaster 规则入口与目录

# 手动触发：从官方 Wiki 总入口自动发现 RMUC/RMUL/RMUA 规则文件入口地址，
# 抓取整站目录快照，并（有 AI key 时）用 deepseek-v4-pro 生成检索关键词建议，
# 写入 data/rm-rules-web.json（边车文件，不会覆盖权威的 data/rm-rules.json）。
#
# 说明：
#   - 规则提炼用 deepseek-v4-pro，走 DeepSeek 的 Anthropic 兼容端点。
#     默认值写在代码里；如需覆盖，可在仓库 Settings → Secrets 配置：
#       AI_API_KEY（必填，与日常翻译共用）
#       AI_RULES_BASE_URL（可选，默认 https://api.deepseek.com/anthropic）
#       AI_RULES_MODEL   （可选，默认 deepseek-v4-pro）
#   - 该 Wiki 为客户端渲染，规则正文抓不到；确切数值仍以 PDF + rules:build 为准。
on:
  workflow_dispatch: {} # 仅手动触发

permissions:
  contents: write # 提交 rm-rules-web.json

jobs:
  fetch-rules:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 发现规则入口 + 关键词建议
        run: npm run rules:fetch
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_RULES_BASE_URL: ${{ secrets.AI_RULES_BASE_URL }}
          AI_RULES_MODEL: ${{ secrets.AI_RULES_MODEL }}

      - name: 提交边车文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rm-rules-web.json
          if git diff --staged --quiet; then
            echo "规则入口/目录无变化，跳过提交"
          else
            git commit -m "chore: 更新 RoboMaster 规则入口与目录快照 $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
