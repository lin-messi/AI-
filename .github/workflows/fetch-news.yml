name: 每日抓取 AI 新闻

# 在云端（GitHub 服务器）定时运行，无需你的电脑开机，
# 也不受本地网络限制（可正常访问 Google/arXiv 等源）。
on:
  schedule:
    # 错峰：刻意避开整点（:00）这个全平台最拥堵的时刻，改用 :17 / :23 / :43 等
    # 非 5 整除的"冷门"分钟，可显著减少 GitHub Actions 的排队延迟。
    # 新闻：每 2 小时的 :17（避开 00/12 点，那两个点交给下面的论文计划一并处理），实现「准实时」更新。
    - cron: "17 2,4,6,8,10,14,16,18,20,22 * * *"
    # 论文 + 新闻：UTC 00:23 / 12:23（约北京 08:23 / 20:23）。
    # 用独立 cron 区分用途，靠 github.event.schedule 判断（计划值，不受 Actions 执行延迟影响）。
    - cron: "23 0,12 * * *"
    # 开源项目 + 新闻：UTC 01:43（约北京 09:43），每天 1 次。
    - cron: "43 1 * * *"
    # RoboMaster 算法资料 + 新闻：每 2 小时的 :47（错峰），实现「准实时」更新。
    - cron: "47 */2 * * *"
  workflow_dispatch: {} # 也支持在 Actions 页面手动触发

permissions:
  contents: write # 允许提交抓取结果

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: npm ci

      - name: 抓取新闻（含翻译/摘要，需在仓库 Settings → Secrets 配置 AI_API_KEY）
        run: npm run fetch
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: 抓取学术论文（arXiv / bioRxiv，含中文精读翻译；仅 00/12 点计划或手动触发）
        run: |
          # 注意：用 github.event.schedule（计划的 cron 原文，固定不变），
          # 不能用实际执行时间——因为 GitHub Actions 定时任务常延迟 40~70 分钟，会跨过整点。
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" = "23 0,12 * * *" ]; then
            npm run fetch:papers
          else
            echo "本次为新闻抓取计划（${{ github.event.schedule }}），跳过论文抓取以控制用量"
          fi
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: 抓取 GitHub 推荐开源项目（含中文简介翻译；仅 01:00 计划或手动触发，每天 1 次）
        run: |
          # 同样用 github.event.schedule 判断，避免 Actions 执行延迟跨过整点导致永不更新。
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" = "43 1 * * *" ]; then
            npm run fetch:github
          else
            echo "本次非开源抓取计划（${{ github.event.schedule }}），跳过 GitHub 抓取以控制用量"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: 抓取 RoboMaster 算法资料（arXiv 论文 + GitHub 库，含中文翻译；仅每 2 小时 :47 计划或手动触发）
        run: |
          # 同样用 github.event.schedule 判断，避免 Actions 执行延迟跨过整点导致跳过。
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" = "47 */2 * * *" ]; then
            npm run fetch:robomaster
          else
            echo "本次非 RM 抓取计划（${{ github.event.schedule }}），跳过 RoboMaster 抓取以控制用量"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: 提交更新的数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive data/index.json data/papers data/papers-index.json data/github data/github-index.json data/robomaster data/robomaster-index.json
          if git diff --staged --quiet; then
            echo "没有新数据，跳过提交"
          else
            git commit -m "chore: 自动更新 AI 新闻与论文 $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
